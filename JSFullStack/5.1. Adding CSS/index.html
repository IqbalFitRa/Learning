<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Adding CSS</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <h1>Three Methods of Adding CSS</h1>
  <p>There are three ways to add CSS to your HTML document:</p>
  <ol>
    <li>Inline CSS</li>
      <p style="color: blue;">It's Inline style css</p>
    <li>Internal CSS</li>
      <style>
        p1 {
          color: red;
        }
      </style>
      <p1><br/>It's Internal style css</p1>
      <P></P>
    <li>External CSS</li>
      <p2><br/>It's External style css</p2>
    </ol>
</body>
</html>
